<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Grade Calculator</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background-color: #1c1c1c;
      font-family: Arial, sans-serif;
      color: white;
    }

    .container {
      width: 320px;
      margin: 100px auto;
      padding: 20px;
      background: #2e2e2e;
      border-radius: 10px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 10px 15px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      background-color: teal;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #008080cc;
    }

    h2 {
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">

    const GradeCalculator = () => {
      const [m1, setM1] = React.useState("");
      const [m2, setM2] = React.useState("");
      const [m3, setM3] = React.useState("");
      const [avg, setAvg] = React.useState(0);
      const [grade, setGrade] = React.useState("");

      const calculate = () => {
        const average = (Number(m1) + Number(m2) + Number(m3)) / 3;
        setAvg(average);

        if (average >= 90) setGrade("A+");
        else if (average >= 75) setGrade("A");
        else if (average >= 60) setGrade("B");
        else if (average >= 50) setGrade("C");
        else setGrade("F");
      };

      return (
        <div className="container">
          <h1>Grade Calculator</h1>

          <input
            type="number"
            value={m1}
            onChange={(e) => setM1(e.target.value)}
            placeholder="Subject 1"
          />

          <input
            type="number"
            value={m2}
            onChange={(e) => setM2(e.target.value)}
            placeholder="Subject 2"
          />

          <input
            type="number"
            value={m3}
            onChange={(e) => setM3(e.target.value)}
            placeholder="Subject 3"
          />

          <button onClick={calculate}>Calculate</button>

          <h2>Average: {avg.toFixed(2)}</h2>
          <h2>Grade: {grade}</h2>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<GradeCalculator />);

  </script>
</body>
</html>
