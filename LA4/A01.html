<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>React Welcome App</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  
  <div id="root"></div>

  <script type="text/babel">

    function Welcome(props) {
      const style = {
        color: "white",
        backgroundColor: "teal",
        padding: "20px",
        borderRadius: "10px",
        textAlign: "center"
      };

      return (
        <div style={style}>
          <h1>Hello, {props.name} 👋</h1>
          <h2>Welcome to {props.city} 🌍</h2>
          <p>
            This is a simple React application demonstrating functional components,
            props, JSX, DOM rendering, and inline styling.
          </p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));

    root.render(<Welcome name="Shrey" city="Chennai" />);

  </script>
</body>
</html>
