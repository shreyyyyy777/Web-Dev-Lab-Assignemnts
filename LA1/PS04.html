<!DOCTYPE html>
<html>
<head>
    <title>Text Formatting Tags</title>
</head>
<body>

    <p><b>This sentence is in bold.</b></p>
    <p><i>This sentence is in italic.</i></p>
    <p><u>This sentence is underlined.</u></p>
    <p><em>This sentence is emphasized.</em></p>
    <p><strong>This sentence is strongly emphasized.</strong></p>

    <p>24BCE2454</p>
    <p>Shrey Sharma</p>

</body>
</html>
