<!DOCTYPE html>
<html>
<head>
    <title>Table Example</title>

    <style>
        table {
            border-collapse: collapse;
            width: 60%;
            margin: auto;
        }

        th, td {
            padding: 15px;
            text-align: center;
        }
    </style>

</head>
<body>

    <table border="1">
        
        <tr style="background-color: lightgreen; font-weight: bold;">
            <th>Name</th>
            <th>Age</th>
            <th>Course</th>
        </tr>

        <tr>
            <td>John</td>
            <td>20</td>
            <td>Computer Science</td>
        </tr>

        <tr>
            <td>Sarah</td>
            <td>21</td>
            <td>Data Science</td>
        </tr>

    </table>

    <p style="text-align:center;">24BCE2454</p>
    <p style="text-align:center;">Shrey Sharma</p>

</body>
</html>
