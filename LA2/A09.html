<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Priority</title>

    <style>
        p {
            color: blue;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <p style="color: red;">
        Inline CSS takes precedence over internal CSS in case of conflicts.
    </p>

</body>
</html>
