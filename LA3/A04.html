<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rectangle Area</title>
</head>

<body>

    <h2>Area of Rectangle</h2>

    <p id="result"></p>

    <script>
        var length = 10;
        var width = 5;

        var areaInteger = length * width;

        length = 10.5;
        width = 5.2;

        var areaFloat = length * width;

        document.getElementById("result").innerHTML =
            "Area (Integer): " + areaInteger + "<br>" +
            "Area (Float): " + areaFloat;
    </script>

</body>
</html>
