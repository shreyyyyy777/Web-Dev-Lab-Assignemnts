<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Generator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        input {
            padding: 8px;
            margin: 10px;
        }

        button {
            padding: 8px 15px;
        }
    </style>
</head>

<body>

    <h2>Email Address Generator</h2>

    <form>
        <input type="text" name="fname" placeholder="First Name">
        <input type="text" name="lname" placeholder="Last Name"><br>

        <button type="button" onclick="generateEmail(this.form)">Generate Email</button>
    </form>

    <h3 id="result"></h3>

    <script>
        function generateEmail(form) {
            var first = form.elements["fname"].value;
            var last = form.elements["lname"].value;

            var email = first + "." + last + "@park.edu";

            document.getElementById("result").innerHTML = email;

            form.reset();
            form.elements["fname"].focus();
        }
    </script>

</body>
</html>
