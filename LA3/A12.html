<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Skills Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        button {
            padding: 8px 15px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h2>Select Your Skills</h2>

    <form id="skillForm">
        <input type="checkbox" name="skill" value="Java"> Java
        <input type="checkbox" name="skill" value="Python"> Python
        <input type="checkbox" name="skill" value="C++"> C++
        <input type="checkbox" name="skill" value="JavaScript"> JavaScript
        <input type="checkbox" name="skill" value="SQL"> SQL
        <br><br>

        <button type="button" onclick="validateSkills()">Submit</button>
    </form>

    <p id="output"></p>

    <script>
        function validateSkills() {
            var skills = document.getElementsByName("skill");
            var selected = [];

            for (var i = 0; i < skills.length; i++) {
                if (skills[i].checked) {
                    selected.push(skills[i].value);
                }
            }

            if (selected.length < 3) {
                document.getElementById("output").innerHTML = "Please select at least 3 skills";
                return;
            }

            if (!document.getElementById("skillForm").checkValidity()) {
                document.getElementById("output").innerHTML = "Form is not valid";
                return;
            }

            document.getElementById("output").innerHTML =
                "Selected Skills: " + selected.join(", ");
        }
    </script>

</body>
</html>
